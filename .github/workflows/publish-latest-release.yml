name: Publish Latest Draft Release

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish-latest-release.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish latest draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(git tag --sort=-v:refname | head -n 1)"
          if [[ -z "$tag" ]]; then
            echo "No tag found."
            exit 1
          fi
          gh release edit "$tag" --draft=false --repo "$GITHUB_REPOSITORY"
