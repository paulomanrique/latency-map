name: Update Release Notes

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/update-release-notes.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update v0.0.6 release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BODY: |
            ## Install

            Download the installer/archive for your platform from the assets below.

            ### Arch Linux

            LatencyMap is available from the AUR:

            ```bash
            # Stable release package
            yay -S latency-map-bin

            # Latest Git build
            yay -S latency-map-git
            ```

            Both AUR packages install `traceroute`, which LatencyMap uses for hop measurements on Linux.
        run: |
          printf '%s\n' "$BODY" > release-notes.md
          gh release edit v0.0.6 --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
