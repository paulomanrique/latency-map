name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            electron_platform: linux
            arch: x64
          - os: ubuntu-latest
            electron_platform: linux
            arch: arm64
          - os: windows-latest
            electron_platform: win
            arch: x64
          - os: windows-latest
            electron_platform: win
            arch: arm64
          - os: macos-latest
            electron_platform: mac
            arch: x64
          - os: macos-latest
            electron_platform: mac
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_RELEASE_OWNER: ${{ github.repository_owner }}
          GH_RELEASE_REPO: ${{ github.event.repository.name }}
        run: npm run release -- --${{ matrix.electron_platform }} --${{ matrix.arch }}
